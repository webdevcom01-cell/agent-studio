[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.worker"

[deploy]
startCommand = "node dist/worker.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
watchPaths = [
  "src/**",
  "prisma/**",
  "package.json",
  "pnpm-lock.yaml",
  "Dockerfile.worker",
  "worker.railway.toml"
]
