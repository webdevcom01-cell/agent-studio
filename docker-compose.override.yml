# Development overrides — applied automatically by `docker compose up`
# For production only, use: docker compose -f docker-compose.yml up
services:
  app:
    build:
      context: .
      target: deps
    command: sh -c "pnpm db:push && pnpm dev"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      NODE_ENV: development
    healthcheck:
      start_period: 60s

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
