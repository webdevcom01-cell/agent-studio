[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.worker"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
watchPaths = [
  "src/lib/queue/**",
  "src/lib/runtime/**",
  "src/lib/managed-tasks/**",
  "src/lib/mcp/**",
  "prisma/**",
  "package.json",
  "pnpm-lock.yaml",
  "railway.worker.toml",
  "Dockerfile.worker"
]
