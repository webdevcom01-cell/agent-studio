<svg viewBox="0 0 960 1180" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" role="img">
  <title>Mapa dekompozicije projekta Agent Studio</title>
  <desc>Hijerarhijska metoda analize: ceo projekat podeljen na 12 glavnih segmenata (Nivo 1), zatim na podsegmente (Nivo 2), zatim na elemente do nivoa fajlova (Nivo 3), pa drugi prolaz verifikacije do konacnog nalaza.</desc>
  <style>
    .lbl{fill:#1a1a1a;}
    .sub{fill:#666;}
    .box{stroke-width:1.5;}
    .a{fill:#6d4aff;}
    .a2{fill:#efeaff;stroke:#6d4aff;}
    .b{fill:#0e9f6e;}
    .b2{fill:#e6f6ef;stroke:#0e9f6e;}
    .n{fill:#f5f5f7;stroke:#cfcfd6;}
    .edge{stroke:#b9b9c2;stroke-width:1.5;fill:none;}
    .edge2{stroke:#6d4aff;stroke-width:1.5;fill:none;stroke-dasharray:4 3;}
    text{font-size:13px;}
    .h{font-size:15px;font-weight:700;}
    .tiny{font-size:11px;}
    .lvl{font-size:12px;font-weight:700;fill:#6d4aff;}
  </style>
  <rect x="0" y="0" width="960" height="1180" fill="#ffffff"/>

  <text x="40" y="38" class="h lbl" font-size="20">Mapa dekompozicije — kako je rađena analiza</text>
  <text x="40" y="60" class="sub tiny">Metoda: ceo → segmenti → podsegmenti → elementi → verifikacija → nalaz. Svaki nivo meren iz koda.</text>

  <rect x="360" y="80" width="240" height="46" rx="10" class="a box"/>
  <text x="480" y="100" text-anchor="middle" class="h" fill="#fff">PROJEKAT: Agent Studio</text>
  <text x="480" y="117" text-anchor="middle" class="tiny" fill="#e9e2ff">~982 fajla · ~318k LOC · monorepo</text>

  <text x="34" y="168" class="lvl">NIVO 1</text>
  <text x="34" y="182" class="sub tiny">Glavni segmenti</text>
  <text x="34" y="600" class="lvl">NIVO 2</text>
  <text x="34" y="614" class="sub tiny">Podsegmenti</text>
  <text x="34" y="770" class="lvl">NIVO 3</text>
  <text x="34" y="784" class="sub tiny">Elementi (fajlovi)</text>
  <text x="34" y="980" class="lvl" fill="#0e9f6e">2. PROLAZ</text>
  <text x="34" y="994" class="sub tiny">Verifikacija</text>

  <path class="edge" d="M480 126 V148"/>
  <path class="edge" d="M150 158 H810"/>

  <g>
    <rect x="150" y="190" width="160" height="56" rx="8" class="a2 box"/>
    <text x="230" y="212" text-anchor="middle" class="lbl h" font-size="13">1 · Web / UI</text>
    <text x="230" y="230" text-anchor="middle" class="sub tiny">app/ · components/</text>
  </g>
  <g>
    <rect x="328" y="190" width="160" height="56" rx="8" class="a2 box"/>
    <text x="408" y="212" text-anchor="middle" class="lbl h" font-size="13">2 · API sloj</text>
    <text x="408" y="230" text-anchor="middle" class="sub tiny">35 grupa ruta</text>
  </g>
  <g>
    <rect x="506" y="190" width="160" height="56" rx="8" class="a2 box"/>
    <text x="586" y="212" text-anchor="middle" class="lbl h" font-size="13">3 · Runtime Engine</text>
    <text x="586" y="230" text-anchor="middle" class="sub tiny">193 TS · engine.ts</text>
  </g>
  <g>
    <rect x="684" y="190" width="160" height="56" rx="8" class="a2 box"/>
    <text x="764" y="212" text-anchor="middle" class="lbl h" font-size="13">4 · Node biblioteka</text>
    <text x="764" y="230" text-anchor="middle" class="sub tiny">72 handlera</text>
  </g>
  <g>
    <rect x="150" y="262" width="160" height="56" rx="8" class="a2 box"/>
    <text x="230" y="284" text-anchor="middle" class="lbl h" font-size="13">5 · Knowledge / RAG</text>
    <text x="230" y="302" text-anchor="middle" class="sub tiny">44 TS</text>
  </g>
  <g>
    <rect x="328" y="262" width="160" height="56" rx="8" class="a2 box"/>
    <text x="408" y="284" text-anchor="middle" class="lbl h" font-size="13">6 · Data / Prisma</text>
    <text x="408" y="302" text-anchor="middle" class="sub tiny">63 modela</text>
  </g>
  <g>
    <rect x="506" y="262" width="160" height="56" rx="8" class="a2 box"/>
    <text x="586" y="284" text-anchor="middle" class="lbl h" font-size="13">7 · Orkestracija</text>
    <text x="586" y="302" text-anchor="middle" class="sub tiny">A2A · SOMA · ECC</text>
  </g>
  <g>
    <rect x="684" y="262" width="160" height="56" rx="8" class="a2 box"/>
    <text x="764" y="284" text-anchor="middle" class="lbl h" font-size="13">8 · Evals</text>
    <text x="764" y="302" text-anchor="middle" class="sub tiny">26 TS</text>
  </g>
  <g>
    <rect x="150" y="334" width="160" height="56" rx="8" class="a2 box"/>
    <text x="230" y="356" text-anchor="middle" class="lbl h" font-size="13">9 · SDLC / DevSecOps</text>
    <text x="230" y="374" text-anchor="middle" class="sub tiny">43 TS</text>
  </g>
  <g>
    <rect x="328" y="334" width="160" height="56" rx="8" class="a2 box"/>
    <text x="408" y="356" text-anchor="middle" class="lbl h" font-size="13">10 · MCP / servisi</text>
    <text x="408" y="374" text-anchor="middle" class="sub tiny">server · 5 servisa · CLI</text>
  </g>
  <g>
    <rect x="506" y="334" width="160" height="56" rx="8" class="a2 box"/>
    <text x="586" y="356" text-anchor="middle" class="lbl h" font-size="13">11 · Governance/Sec</text>
    <text x="586" y="374" text-anchor="middle" class="sub tiny">security·safety·cost</text>
  </g>
  <g>
    <rect x="684" y="334" width="160" height="56" rx="8" class="a2 box"/>
    <text x="764" y="356" text-anchor="middle" class="lbl h" font-size="13">12 · Infra / Docs</text>
    <text x="764" y="374" text-anchor="middle" class="sub tiny">k8s·CI·website</text>
  </g>

  <path class="edge" d="M586 246 V250 M586 250 H300 M300 250 V440 M586 250 H760 M760 250 V440 M586 250 V440 M450 250 V440 M450 250 H586"/>
  <text x="500" y="468" text-anchor="middle" class="sub tiny">primer „uvećavanja" jednog segmenta (S3 Runtime) na Nivo 2 →</text>

  <g>
    <rect x="150" y="490" width="150" height="50" rx="8" class="n box"/>
    <text x="225" y="511" text-anchor="middle" class="lbl" font-size="12.5">Jezgro motora</text>
    <text x="225" y="528" text-anchor="middle" class="sub tiny">engine · context · hooks</text>
  </g>
  <g>
    <rect x="320" y="490" width="150" height="50" rx="8" class="n box"/>
    <text x="395" y="511" text-anchor="middle" class="lbl" font-size="12.5">Debug / protokol</text>
    <text x="395" y="528" text-anchor="middle" class="sub tiny">stream · session-events</text>
  </g>
  <g>
    <rect x="490" y="490" width="150" height="50" rx="8" class="n box"/>
    <text x="565" y="511" text-anchor="middle" class="lbl" font-size="12.5">Python izvršavanje</text>
    <text x="565" y="528" text-anchor="middle" class="sub tiny">pyodide worker</text>
  </g>
  <g>
    <rect x="660" y="490" width="150" height="50" rx="8" class="n box"/>
    <text x="735" y="511" text-anchor="middle" class="lbl" font-size="12.5">Testovi</text>
    <text x="735" y="528" text-anchor="middle" class="sub tiny">__tests__/</text>
  </g>
  <path class="edge" d="M225 540 V556 M225 556 H735 M395 540 V556 M565 540 V556 M735 540 V556"/>
  <path class="edge" d="M480 470 V490"/>

  <g>
    <rect x="150" y="640" width="660" height="92" rx="8" class="b2 box"/>
    <text x="170" y="664" class="lbl h" font-size="13" fill="#0e7a55">Nivo 3 — poimenični elementi (do fajla)</text>
    <text x="170" y="686" class="sub tiny">npr. iz „Jezgro motora": engine.ts · engine-streaming.ts · execution-prelude.ts · context.ts</text>
    <text x="170" y="704" class="sub tiny">context-compaction.ts · hooks.ts · template.ts · types.ts · debug-controller.ts …</text>
    <text x="170" y="722" class="sub tiny">→ isti postupak ponovljen za svaki od 12 segmenata (handleri, modeli, rute, servisi).</text>
  </g>
  <path class="edge" d="M480 590 V640"/>

  <rect x="150" y="852" width="660" height="250" rx="10" class="b2 box" fill="#f3fbf7"/>
  <text x="170" y="878" class="h" font-size="15" fill="#0e7a55">DRUGI PROLAZ — verifikacija → konačan nalaz</text>

  <g>
    <rect x="170" y="896" width="200" height="58" rx="8" class="b box"/>
    <text x="270" y="920" text-anchor="middle" class="h" font-size="13" fill="#fff">① Skeniraj praznine</text>
    <text x="270" y="938" text-anchor="middle" class="tiny" fill="#dff3ea">delovi van 1. prolaza</text>
  </g>
  <g>
    <rect x="390" y="896" width="200" height="58" rx="8" class="b box"/>
    <text x="490" y="920" text-anchor="middle" class="h" font-size="13" fill="#fff">② Izmeri iz koda</text>
    <text x="490" y="938" text-anchor="middle" class="tiny" fill="#dff3ea">grep · find · wc · git</text>
  </g>
  <g>
    <rect x="610" y="896" width="180" height="58" rx="8" class="b box"/>
    <text x="700" y="920" text-anchor="middle" class="h" font-size="13" fill="#fff">③ Potvrdi / ispravi</text>
    <text x="700" y="938" text-anchor="middle" class="tiny" fill="#dff3ea">nula halucinacija</text>
  </g>
  <path class="edge2" d="M370 925 H390 M590 925 H610"/>

  <text x="170" y="982" class="lbl" font-size="12.5">Otkriveno što je 1. prolaz propustio (verifikovano):</text>
  <text x="170" y="1002" class="sub tiny">• deal-flow-agent/ — zaseban Python multi-agent proizvod (21 .py)   • n8n-workflows/   • data/security-audits/</text>
  <text x="170" y="1020" class="sub tiny">• reports/ (30)   • korenski skill paketi   • src/data/ template-i (221 + 30)</text>
  <text x="170" y="1044" class="lbl" font-size="12.5" fill="#a23b3b">Rizici (iz vlastitih audita projekta):</text>
  <text x="170" y="1064" class="sub tiny">🔴 RLS samo na Agent tabeli · 🟠 nevalidirani A2A/MCP ulazi · 🟠 higijena korena (189 stavki)</text>
  <text x="170" y="1086" class="sub tiny">✅ tajne nisu u Git-u · ✅ 1077/1077 handler testova · ✅ evali 10/10</text>

  <path class="edge2" d="M480 732 V852"/>

  <rect x="150" y="1124" width="14" height="14" rx="3" class="a2"/>
  <text x="170" y="1135" class="sub tiny">segment / podsegment</text>
  <rect x="330" y="1124" width="14" height="14" rx="3" class="b2"/>
  <text x="350" y="1135" class="sub tiny">elementi / verifikacija</text>
  <line x1="520" y1="1131" x2="548" y2="1131" class="edge2"/>
  <text x="554" y="1135" class="sub tiny">tok do konačnog nalaza</text>
</svg>
