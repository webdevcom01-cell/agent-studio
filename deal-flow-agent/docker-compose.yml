version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dealflow
      POSTGRES_USER: dealflow
      POSTGRES_PASSWORD: dealflow_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealflow -d dealflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dealflow:dealflow_secret@db:5432/dealflow
      # Add your real keys to enable live AI:
      # ANTHROPIC_API_KEY: sk-ant-...
      # OPENAI_API_KEY: sk-...
      # LINKEDIN_CLIENT_ID: ...
      # LINKEDIN_CLIENT_SECRET: ...
      # CRUNCHBASE_API_KEY: ...
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
