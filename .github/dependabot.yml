version: 2

updates:
  # Main app npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    labels:
      - "dependencies"
    reviewers:
      - "webdevcom01-cell"
    ignore:
      # Block all major version bumps — review and upgrade manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docusaurus documentation website
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docs"
    reviewers:
      - "webdevcom01-cell"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # MCP server npm dependencies
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mcp"
    reviewers:
      - "webdevcom01-cell"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Intentionally vulnerable demo — suppress Dependabot alerts
  # This directory exists to demonstrate security vulnerabilities for DevOps Swarm demos
  - package-ecosystem: "npm"
    directory: "/scripts/create-vulnerable-demo"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "demo"
    ignore:
      # Intentionally vulnerable demo app — do not auto-update
      - dependency-name: "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    reviewers:
      - "webdevcom01-cell"
    ignore:
      # We use SHA-pinned actions — major bumps reviewed manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "docker"
    reviewers:
      - "webdevcom01-cell"
    ignore:
      # Major Node/Alpine base image bumps reviewed manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ECC Skills MCP service (Python)
  - package-ecosystem: "pip"
    directory: "/services/ecc-skills-mcp"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ecc"
    reviewers:
      - "webdevcom01-cell"

  # Deal Flow Agent (Python)
  - package-ecosystem: "pip"
    directory: "/deal-flow-agent"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "deal-flow"
    reviewers:
      - "webdevcom01-cell"
