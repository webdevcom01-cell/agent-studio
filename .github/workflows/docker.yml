name: Docker Build & Push

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Raised from 30 -> 45 min. Phase 0a docker build clocked 30m 29s and was
    # cancelled — see docs/rls-tech-debt.md item #1. Combined with dropping the
    # linux/arm64 QEMU leg below, this gives comfortable headroom.
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # QEMU is no longer required since we build a single native platform,
      # but keeping the action available in case we re-add arm64 on a separate
      # release-only workflow later. It's a no-op on amd64-only builds.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          # Dropped linux/arm64. Railway (the only current production target)
          # runs amd64. arm64 was being cross-compiled via QEMU emulation and
          # consumed ~50% of build wall-clock for zero consumers. If arm64
          # support is needed later (Apple Silicon dev, AWS Graviton), add
          # a separate release-arm64.yml that runs on tagged releases only.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
