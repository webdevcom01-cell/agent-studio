name: Docker Build & Push

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Raised from 30 -> 45 min. Phase 0a docker build clocked 30m 29s and was
    # cancelled — see docs/_archive/rls-tech-debt.md item #1. Combined with dropping the
    # linux/arm64 QEMU leg below, this gives comfortable headroom.
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # QEMU is no longer required since we build a single native platform,
      # but keeping the action available in case we re-add arm64 on a separate
      # release-only workflow later. It's a no-op on amd64-only builds.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          # Dropped linux/arm64. Railway (the only current production target)
          # runs amd64. arm64 was being cross-compiled via QEMU emulation and
          # consumed ~50% of build wall-clock for zero consumers. If arm64
          # support is needed later (Apple Silicon dev, AWS Graviton), add
          # a separate release-arm64.yml that runs on tagged releases only.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
