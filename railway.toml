[build]
builder = "NIXPACKS"
buildCommand = "mkdir -p .git && pnpm install --no-frozen-lockfile && npx prisma db push --skip-generate && pnpm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 2
watchPaths = [
  "src/**",
  "prisma/**",
  "public/**",
  "package.json",
  "pnpm-lock.yaml",
  "next.config.ts",
  "railway.toml",
  "nixpacks.toml",
  "Dockerfile"
]
