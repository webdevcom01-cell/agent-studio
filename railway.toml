[build]
builder = "NIXPACKS"
buildCommand = "pnpm add ioredis && pnpm run build"

[deploy]
startCommand = "node_modules/.bin/prisma db push --accept-data-loss || echo 'Schema sync skipped' && PORT=${PORT:-3000} node .next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 2
