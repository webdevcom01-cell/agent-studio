[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "node server.js"
preDeployCommand = ["prisma migrate deploy"]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 2
watchPaths = [
  "src/**",
  "prisma/**",
  "public/**",
  "package.json",
  "pnpm-lock.yaml",
  "next.config.ts",
  "railway.toml",
  "nixpacks.toml",
  "Dockerfile"
]
