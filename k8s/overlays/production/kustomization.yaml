apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: agent-studio

patches:
  - target:
      kind: Deployment
      name: agent-studio
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi

  - target:
      kind: Ingress
      name: agent-studio
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: agent-studio-production.example.com
      - op: replace
        path: /spec/rules/0/host
        value: agent-studio-production.example.com

images:
  - name: agent-studio
    newName: ghcr.io/org/agent-studio
    newTag: latest
  - name: ecc-skills-mcp
    newName: ghcr.io/org/ecc-skills-mcp
    newTag: latest
