apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: agent-studio-staging

patches:
  - target:
      kind: Deployment
      name: agent-studio
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi

  - target:
      kind: Ingress
      name: agent-studio
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: agent-studio-staging.example.com
      - op: replace
        path: /spec/rules/0/host
        value: agent-studio-staging.example.com

  - target:
      kind: ConfigMap
      name: agent-studio-config
    patch: |
      - op: replace
        path: /data/ECC_ENABLED
        value: "false"

images:
  - name: agent-studio
    newName: ghcr.io/org/agent-studio
    newTag: staging
  - name: ecc-skills-mcp
    newName: ghcr.io/org/ecc-skills-mcp
    newTag: staging
