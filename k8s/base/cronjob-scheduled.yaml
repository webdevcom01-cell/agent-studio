apiVersion: batch/v1
kind: CronJob
metadata:
  name: trigger-scheduled-flows
  namespace: agent-studio
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cron
              image: curlimages/curl:8.5.0
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer $(CRON_SECRET)" \
                    -H "Content-Type: application/json" \
                    http://agent-studio.agent-studio.svc.cluster.local/api/cron/trigger-scheduled-flows
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: agent-studio-secrets
                      key: CRON_SECRET
