apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecc-skills-mcp
  namespace: agent-studio
  labels:
    app: agent-studio
    component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-studio
      component: mcp
  template:
    metadata:
      labels:
        app: agent-studio
        component: mcp
    spec:
      containers:
        - name: ecc-skills-mcp
          image: ecc-skills-mcp:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-studio-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
